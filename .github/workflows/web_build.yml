name: "Deploy Game to Web"
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

# อนุญาตให้ระบบอ่าน/เขียนโปรเจกต์ (สำหรับ Github Pages)
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export-web:
    name: Export Web Game
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Copy Godot Templates
        run: |
          mkdir -p ~/.local/share/godot
          cp -r /root/.local/share/godot/export_templates ~/.local/share/godot/

      - name: Export Web
        run: |
          mkdir -p build/web
          godot -v --headless --export-debug "Web" build/web/index.html
          # Godot outputs index.html, index.js, index.pck, index.wasm.

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: build/web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
