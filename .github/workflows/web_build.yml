name: "Deploy Game to Web"
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

# อนุญาตให้ระบบอ่าน/เขียนโปรเจกต์ (สำหรับ Github Pages)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export-web:
    name: Export Web Game
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Copy Godot Templates
        run: |
          mkdir -p ~/.local/share/godot
          cp -r /root/.local/share/godot/export_templates ~/.local/share/godot/

      - name: Export Web
        run: |
          mkdir -p build/web
          godot -v --headless --export-debug "Web" build/web/index.html
          # Godot outputs index.html, index.js, index.pck, index.wasm.

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export-web
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
